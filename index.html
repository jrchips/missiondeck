<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0F1318">
<meta name="description" content="MissionDeck — personal ops center. Tasks, Kanban, calendar, notes, focus timer, and break games. Built for Jose Reyna.">
<title>MissionDeck</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app">

  <!-- ============ SIDEBAR / NAV ============ -->
  <nav id="nav">
    <div class="nav-brand">
      <svg class="gem" viewBox="0 0 32 32" aria-hidden="true">
        <polygon points="8,4 24,4 30,12 16,29 2,12" fill="var(--accent)" opacity="0.18"/>
        <polygon points="8,4 24,4 30,12 16,29 2,12" fill="none" stroke="var(--accent)" stroke-width="1.6" stroke-linejoin="round"/>
        <polyline points="2,12 30,12" stroke="var(--accent)" stroke-width="1.2" fill="none"/>
        <polyline points="8,4 11,12 16,29 21,12 24,4" stroke="var(--accent)" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
      </svg>
      <div class="brand-text">
        <span class="brand-name">MissionDeck</span>
        <span class="brand-sub">Personal Ops Center</span>
      </div>
    </div>

    <button class="nav-item" data-view="tasks" aria-label="Tasks">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3 8-8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>Tasks</span>
    </button>
    <button class="nav-item" data-view="board" aria-label="Board">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="5" height="16" rx="1" fill="none" stroke="currentColor" stroke-width="2"/><rect x="10" y="4" width="5" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="2"/><rect x="17" y="4" width="5" height="13" rx="1" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      <span>Board</span>
    </button>
    <button class="nav-item" data-view="calendar" aria-label="Calendar">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3 10h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
      <span>Calendar</span>
    </button>
    <button class="nav-item" data-view="notes" aria-label="Notes">
      <svg viewBox="0 0 24 24"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M14 3v6h6M9 13h6M9 17h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
      <span>Notes</span>
    </button>
    <button class="nav-item" data-view="focus" aria-label="Focus">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 9v4l3 2M9 2h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
      <span>Focus</span>
    </button>
    <button class="nav-item" data-view="break" aria-label="Break">
      <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="12" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M7 11v4M5 13h4M15 12h.01M18 14h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
      <span>Break</span>
    </button>
    <button class="nav-item nav-settings" data-view="settings" aria-label="Settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
      <span>Settings</span>
    </button>
  </nav>

  <!-- ============ MAIN ============ -->
  <main id="main">
    <section id="view-tasks" class="view"></section>
    <section id="view-board" class="view"></section>
    <section id="view-calendar" class="view"></section>
    <section id="view-notes" class="view"></section>
    <section id="view-focus" class="view"></section>
    <section id="view-break" class="view"></section>
    <section id="view-settings" class="view"></section>
  </main>

  <!-- Floating action buttons (tasks view) -->
  <div id="fabs" class="hidden">
    <button id="fab-voice" class="fab fab-secondary" title="Add task by voice" aria-label="Add task by voice">
      <svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
    </button>
    <button id="fab-add" class="fab" title="Add task" aria-label="Add task">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- Modal -->
  <div id="modal-backdrop" class="hidden">
    <div id="modal" role="dialog" aria-modal="true"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden"></div>
</div>

<script src="js/app.js"></script>
<script src="js/games.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
